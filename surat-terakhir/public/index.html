<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Surat Terakhir — Pembawa Surat</title>
  <meta name="description" content="Game Bible-themed social deduction untuk pemuda gereja. Mobile-first. AI-augmented.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#F5F0FF',
              100: '#EDE0FF',
              200: '#D9C2FF',
              300: '#BE9BFF',
              400: '#9F6BFF',
              500: '#8A2BE2',
              600: '#7823CC',
              700: '#621CAA',
              800: '#4E1688',
              900: '#3B1066',
            },
          },
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
            display: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            card: '0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06)',
            cardHover: '0 8px 24px rgba(138,43,226,0.10), 0 2px 6px rgba(0,0,0,0.06)',
            soft: '0 1px 2px rgba(0,0,0,0.05)',
            screen: '0 20px 40px -10px rgba(138,43,226,0.25), 0 8px 16px -4px rgba(0,0,0,0.08)',
          },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    html { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    body { -webkit-font-smoothing: antialiased; }
    .reveal { opacity: 0; transform: translateY(8px); transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
    .reveal.in { opacity: 1; transform: translateY(0); }

    /* Tilted iso stack — matches reference image composition */
    .iso-stage { perspective: 1200px; height: 280px; position: relative; }
    .iso-card {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 180px;
      background: white;
      border-radius: 22px;
      box-shadow: 0 20px 40px -10px rgba(138,43,226,0.25), 0 8px 16px -4px rgba(0,0,0,0.10);
      transform-origin: center center;
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      overflow: hidden;
    }
    .iso-card.c1 { transform: translate(-50%, -50%) translateX(-90px) translateY(-10px) rotate(-8deg); z-index: 3; }
    .iso-card.c2 { transform: translate(-50%, -50%) translateY(0) rotate(0deg); z-index: 4; }
    .iso-card.c3 { transform: translate(-50%, -50%) translateX(90px) translateY(-10px) rotate(8deg); z-index: 3; }
    .iso-card .header { background: linear-gradient(135deg, #8A2BE2, #621CAA); padding: 12px 14px 22px; color: white; position: relative; }
    .iso-card .header .x { position: absolute; top: 8px; right: 8px; width: 18px; height: 18px; background: rgba(255,255,255,0.18); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 10px; }
    .iso-card .body { padding: 12px 14px; }
    .iso-card .line { height: 6px; background: #f3f4f6; border-radius: 3px; margin-bottom: 6px; }
    .iso-card .line.purple { background: #EDE0FF; }
    .iso-card .line.short { width: 60%; }

    @media (max-width: 640px) {
      .iso-stage { height: 240px; }
      .iso-card { width: 150px; }
      .iso-card.c1 { transform: translate(-50%, -50%) translateX(-72px) translateY(-8px) rotate(-8deg); }
      .iso-card.c3 { transform: translate(-50%, -50%) translateX(72px) translateY(-8px) rotate(8deg); }
    }

    .float { animation: float 4s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
  </style>
</head>
<body class="min-h-screen bg-gray-50 text-gray-900 antialiased overflow-x-hidden">

  <!-- Curved purple header — matches reference image "Welcome to Here is the store name" -->
  <div class="bg-brand-500 relative overflow-hidden">
    <div class="absolute inset-0 opacity-15">
      <svg class="absolute -top-20 -right-20 w-80 h-80" viewBox="0 0 200 200" fill="none">
        <circle cx="100" cy="100" r="100" fill="white" opacity="0.3"/>
      </svg>
    </div>
    <div class="relative px-6 pt-10 pb-10 text-center text-white">
      <p class="text-[10px] font-bold tracking-[0.2em] uppercase opacity-80 mb-2 reveal" data-delay="1">Welcome to</p>
      <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight reveal" data-delay="2">Surat Terakhir</h1>
      <p class="text-sm opacity-80 mt-1 reveal" data-delay="3">Pembawa Surat · Youth Edition 2026</p>
    </div>
  </div>

  <main class="max-w-md mx-auto px-4 sm:px-6 -mt-6 relative z-10">

    <!-- Main card (matches "Join now" white card in reference) -->
    <div class="bg-white rounded-3xl shadow-card p-6 sm:p-8 reveal" data-delay="3">

      <!-- Iso-tilted preview stack (signature element from reference image) -->
      <div class="iso-stage mb-6">
        <div class="iso-card c1">
          <div class="header">
            <div class="x">×</div>
            <p class="text-[7px] font-bold uppercase tracking-widest opacity-80">Rewards</p>
            <p class="text-base font-extrabold mt-0.5">1000</p>
          </div>
          <div class="body">
            <div class="line purple" style="width:80%"></div>
            <div class="line"></div>
            <div class="line short"></div>
          </div>
        </div>
        <div class="iso-card c2">
          <div class="header">
            <div class="x">×</div>
            <p class="text-[7px] font-bold uppercase tracking-widest opacity-80">Welcome to</p>
            <p class="text-[11px] font-extrabold mt-0.5">Mulai Sesi</p>
          </div>
          <div class="body">
            <div class="line"></div>
            <div class="line purple" style="width:70%"></div>
            <div class="line short"></div>
          </div>
        </div>
        <div class="iso-card c3">
          <div class="header">
            <div class="x">×</div>
            <p class="text-[7px] font-bold uppercase tracking-widest opacity-80">Referrals</p>
            <p class="text-[11px] font-extrabold mt-0.5">10% Off</p>
          </div>
          <div class="body">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line purple short"></div>
          </div>
        </div>
      </div>

      <!-- Illustrated hero (matches "Join now" CTA card in reference) -->
      <div class="bg-gradient-to-br from-brand-50 to-white rounded-2xl p-6 mb-5 text-center relative overflow-hidden border border-brand-100">
        <svg class="w-20 h-20 mx-auto mb-3 float" viewBox="0 0 80 80" fill="none">
          <circle cx="40" cy="40" r="36" fill="#F5F0FF" stroke="#8A2BE2" stroke-width="2"/>
          <path d="M22 28h36v28a4 4 0 01-4 4H26a4 4 0 01-4-4V28z" fill="white" stroke="#8A2BE2" stroke-width="2"/>
          <path d="M22 28l18 12 18-12" stroke="#8A2BE2" stroke-width="2" stroke-linejoin="round"/>
          <circle cx="58" cy="22" r="3" fill="#BE9BFF"/>
          <path d="M55 22l2 2 4-4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h2 class="font-extrabold text-xl leading-tight">Mulai Sesi</h2>
        <p class="text-xs text-gray-500 mt-1">Minta sandi dari panitia</p>
        <div class="absolute top-3 left-3 w-2 h-2 rounded-full bg-brand-200"></div>
        <div class="absolute top-3 right-3 w-2 h-2 rounded-full bg-brand-200"></div>
        <div class="absolute bottom-3 left-3 w-1.5 h-1.5 rounded-full bg-brand-300"></div>
        <div class="absolute bottom-3 right-3 w-1.5 h-1.5 rounded-full bg-brand-300"></div>
      </div>

      <form id="auth-form" novalidate class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-700 mb-1.5 ml-1">Sandi</label>
          <input type="password" id="password" class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-4 py-3.5 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:border-brand-500 focus:bg-white focus:ring-4 focus:ring-brand-100 transition-all" placeholder="••••••••" autocomplete="current-password" required>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-700 mb-1.5 ml-1">Nama panggilan</label>
          <input type="text" id="name" maxlength="20" class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-4 py-3.5 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:border-brand-500 focus:bg-white focus:ring-4 focus:ring-brand-100 transition-all" placeholder="cth. Daniel" required>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-700 mb-1.5 ml-1">Masuk sebagai</label>
          <div class="grid grid-cols-2 gap-2 p-1 bg-gray-100 rounded-2xl">
            <button type="button" class="role-pill active flex items-center justify-center gap-1.5 py-2.5 rounded-xl text-sm font-medium transition-all" data-role="player">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3.5"/><path d="M3 20c0-3 2.7-5.5 6-5.5s6 2.5 6 5.5"/></svg>
              Pemain
            </button>
            <button type="button" class="role-pill flex items-center justify-center gap-1.5 py-2.5 rounded-xl text-sm font-medium text-gray-500 transition-all" data-role="moderator">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18M5 21V10l7-5 7 5v11"/><path d="M9 21v-7h6v7"/></svg>
              Moderator
            </button>
          </div>
        </div>

        <button type="submit" id="submit-btn" class="w-full bg-brand-500 hover:bg-brand-600 text-white font-semibold rounded-2xl py-4 text-sm flex items-center justify-center gap-2 transition-all shadow-card hover:shadow-cardHover mt-2 disabled:opacity-50 disabled:cursor-not-allowed">
          <span id="btn-text">Masuk</span>
          <span id="btn-icon" class="w-5 h-5 rounded-full bg-white/20 flex items-center justify-center text-xs">→</span>
        </button>

        <p id="alert" class="text-xs text-red-500 text-center hidden"></p>
      </form>
    </div>

    <!-- Stats row -->
    <div class="mt-6 grid grid-cols-4 gap-2 reveal" data-delay="4">
      <div class="bg-white rounded-2xl p-3 text-center shadow-card">
        <div class="text-xl font-extrabold text-brand-500">3-12</div>
        <div class="text-[10px] text-gray-500 mt-0.5 uppercase tracking-wider">Pemain</div>
      </div>
      <div class="bg-white rounded-2xl p-3 text-center shadow-card">
        <div class="text-xl font-extrabold text-brand-500">15m</div>
        <div class="text-[10px] text-gray-500 mt-0.5 uppercase tracking-wider">Sesi</div>
      </div>
      <div class="bg-white rounded-2xl p-3 text-center shadow-card">
        <div class="text-xl font-extrabold text-brand-500">5</div>
        <div class="text-[10px] text-gray-500 mt-0.5 uppercase tracking-wider">Ronde</div>
      </div>
      <div class="bg-white rounded-2xl p-3 text-center shadow-card">
        <div class="text-xl font-extrabold text-brand-500">∞</div>
        <div class="text-[10px] text-gray-500 mt-0.5 uppercase tracking-wider">Fragmen</div>
      </div>
    </div>

    <div class="h-12"></div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let role = 'player';
    document.querySelectorAll('.role-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.role-pill').forEach(b => {
          b.classList.remove('active');
          b.classList.add('text-gray-500');
          b.style.background = 'transparent';
          b.style.boxShadow = 'none';
        });
        btn.classList.add('active');
        btn.classList.remove('text-gray-500');
        btn.style.background = 'white';
        btn.style.boxShadow = '0 1px 2px rgba(0,0,0,0.06)';
        role = btn.dataset.role;
      });
    });
    document.querySelector('.role-pill.active').style.background = 'white';
    document.querySelector('.role-pill.active').style.boxShadow = '0 1px 2px rgba(0,0,0,0.06)';

    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const d = e.target.dataset.delay || 0;
          setTimeout(() => e.target.classList.add('in'), d * 80);
          io.unobserve(e.target);
        }
      });
    });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));

    const form = document.getElementById('auth-form');
    const pw = document.getElementById('password');
    const nm = document.getElementById('name');
    const btn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const btnIcon = document.getElementById('btn-icon');
    const alertEl = document.getElementById('alert');

    function showError(msg) {
      alertEl.textContent = msg;
      alertEl.classList.remove('hidden');
    }
    function setLoading(loading) {
      btn.disabled = loading;
      btnText.textContent = loading ? 'Menghubungkan' : 'Masuk';
      btnIcon.textContent = loading ? '⏳' : '→';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!pw.value.trim()) { showError('Sandi tidak boleh kosong'); pw.focus(); return; }
      if (!nm.value.trim()) { showError('Nama tidak boleh kosong'); nm.focus(); return; }
      setLoading(true);
      try {
        const res = await fetch('/api/auth', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw.value.trim(), name: nm.value.trim(), role })
        });
        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch { throw new Error('Server tidak merespons dengan benar. Pastikan server berjalan.'); }
        if (!res.ok) throw new Error(data.error?.message || 'Gagal');
        btnText.textContent = 'Berhasil';
        setTimeout(() => window.location.href = role === 'moderator' ? '/moderator' : '/player', 300);
      } catch (err) {
        const m = err.message || '';
        if (m.toLowerCase().includes('sandi') || m.includes('401')) showError('Sandi salah. Coba lagi.');
        else if (m.includes('429')) showError('Terlalu banyak percobaan. Tunggu 5 menit.');
        else if (m.includes('Failed to fetch') || m.includes('NetworkError') || m.includes('tidak merespons')) showError('Tidak bisa terhubung ke server. Pastikan server berjalan.');
        else showError(m);
        setLoading(false);
      }
    });
    pw.focus();
  </script>
</body>
</html>
