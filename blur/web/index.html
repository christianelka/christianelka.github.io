<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0a0a0a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<!--
  CSP: iOS Chrome / Safari require explicit 'unsafe-eval' and 'wasm-unsafe-eval'
  for WebAssembly instantiation. Without these, the MediaPipe HandLandmarker
  fails with "Refused to create a WebAssembly object".
  - self:            local app (HTML / JS / CSS / vendor bundle)
  - unsafe-inline:   <style> in <head> (kept minimal but needed)
  - unsafe-eval:     WASM instantiation on legacy WebKit
  - wasm-unsafe-eval:WASM instantiation on CSP3-compliant browsers
  - https: *:        MediaPipe WASM glue + HandLandmarker .task model
  - blob: data:      MediaPipe creates blob URLs for the loaded graph
  - media-src blob:   getUserMedia() video stream
  - connect-src *:    model download from storage.googleapis.com
-->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' https: blob:; worker-src 'self' blob:; child-src 'self' blob:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https:; media-src 'self' blob:; connect-src 'self' https: data: blob: ws: wss:; font-src 'self' https: data:;" />
<title>Blur Guard</title>

<!-- MediaPipe HandLandmarker loaded locally from ./vendor/ via app.js (no CDN) -->

<style>
  :root {
    --bg: #0a0a0a;
    --ink: #f5f5f5;
    --muted: #8a8a8a;
    --border: rgba(255, 255, 255, 0.12);
    --panel: rgba(20, 20, 20, 0.72);
    --panel-strong: rgba(10, 10, 10, 0.92);
    --accent: #ff3b6b;
    --warn: #ffb020;
    --ok: #4ade80;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }
  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  /* Header */
  header {
    padding: env(safe-area-inset-top) 16px 0;
    padding-top: max(env(safe-area-inset-top), 12px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .brand-dot {
    width: 10px;
    height: 10px;
    border-radius: 999px;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }
  .brand-name { font-size: 15px; }
  .brand-tag { font-size: 11px; color: var(--muted); font-weight: 500; }

  /* Style picker */
  .style-picker {
    position: relative;
  }
  .style-picker select {
    appearance: none;
    -webkit-appearance: none;
    background: var(--panel);
    color: var(--ink);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 30px 8px 12px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .style-picker::after {
    content: "▾";
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: var(--muted);
    font-size: 11px;
  }

  /* Stage */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 16px 16px;
  }
  .stage {
    position: relative;
    width: 100%;
    max-width: 720px;
    aspect-ratio: 16 / 9;
    background: #111;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,0.6), 0 0 0 1px var(--border);
  }
  .stage video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: #000;
  }
  .stage canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  /* Permission overlay */
  .permission {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    background: linear-gradient(180deg, rgba(10,10,10,0.92), rgba(10,10,10,0.98));
    z-index: 10;
    gap: 14px;
  }
  .permission h2 {
    margin: 0;
    font-size: 18px;
    font-weight: 700;
  }
  .permission p {
    margin: 0;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
    max-width: 320px;
  }
  .permission button {
    appearance: none;
    border: 0;
    background: var(--ink);
    color: #000;
    font-family: inherit;
    font-weight: 600;
    font-size: 14px;
    padding: 12px 20px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 100ms;
  }
  .permission button:active { transform: scale(0.97); }
  .permission.error button { background: var(--accent); color: #fff; }

  /* Footer */
  footer {
    padding: 8px 16px max(env(safe-area-inset-bottom), 12px);
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.4;
  }
  footer kbd {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 10px;
    font-family: inherit;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="brand-dot"></span>
    <div>
      <div class="brand-name">Blur Guard</div>
      <div class="brand-tag">peace-sign privacy</div>
    </div>
  </div>
  <div class="style-picker">
    <select id="styleSelect" aria-label="Visual style">
      <option value="none">None</option>
      <option value="y2k">Y2K</option>
      <option value="soft">Soft</option>
      <option value="doomer">Doomer</option>
      <option value="webcore">Webcore</option>
    </select>
  </div>
</header>

<main>
  <div class="stage" id="stage">
    <video id="video" playsinline muted autoplay></video>
    <canvas id="canvas"></canvas>
    <div class="permission" id="permission">
      <h2>Camera access</h2>
      <p>Blur Guard needs your camera to detect peace signs. Frames stay on-device.</p>
      <button id="startBtn">Enable camera</button>
    </div>
  </div>
</main>

<footer>
  Show <kbd>2</kbd> peace signs to engage &middot; stop to release &middot; <kbd>2</kbd> peace sign = index + middle, others folded
</footer>

<script type="module" src="./app.js"></script>
</body>
</html>
